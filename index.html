<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        /* Add some basic styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Task Manager</h1>
    <button id="taskBtn">Tasks</button>
    <button id="noteBtn">Notes</button>
    <button id="homeworkBtn">Homework</button>
    <button id="logoutBtn">Logout</button>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close" id="taskClose">&times;</span>
            <h2>Tasks</h2>
            <p>Here you can add or view tasks.</p>
            <!-- Add task input and list here -->
        </div>
    </div>

    <div id="noteModal" class="modal">
        <div class="modal-content">
            <span class="close" id="noteClose">&times;</span>
            <h2>Notes</h2>
            <p>Here you can add or view notes.</p>
            <!-- Add note input and list here -->
        </div>
    </div>

    <div id="homeworkModal" class="modal">
        <div class="modal-content">
            <span class="close" id="homeworkClose">&times;</span>
            <h2>Homework</h2>
            <p>Here you can add or view homework.</p>
            <!-- Add homework input and list here -->
        </div>
    </div>

    <script>
        // Modal functionality
        const taskBtn = document.getElementById('taskBtn');
        const taskModal = document.getElementById('taskModal');
        const taskClose = document.getElementById('taskClose');

        taskBtn.onclick = function() {
            taskModal.style.display = 'block';
        }

        taskClose.onclick = function() {
            taskModal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == taskModal) {
                taskModal.style.display = 'none';
            }
        }

        // Repeat for notes and homework

        const noteBtn = document.getElementById('noteBtn');
        const noteModal = document.getElementById('noteModal');
        const noteClose = document.getElementById('noteClose');

        noteBtn.onclick = function() {
            noteModal.style.display = 'block';
        }

        noteClose.onclick = function() {
            noteModal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == noteModal) {
                noteModal.style.display = 'none';
            }
        }

        const homeworkBtn = document.getElementById('homeworkBtn');
        const homeworkModal = document.getElementById('homeworkModal');
        const homeworkClose = document.getElementById('homeworkClose');

        homeworkBtn.onclick = function() {
            homeworkModal.style.display = 'block';
        }

        homeworkClose.onclick = function() {
            homeworkModal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == homeworkModal) {
                homeworkModal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
